<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Place Details – Madampe Explorer</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --sand:   #f5ede0;
      --sand2:  #e8d9c4;
      --teal:   #1a5c52;
      --teal2:  #22776a;
      --teal3:  #0d3d35;
      --gold:   #c8923a;
      --gold2:  #e0b060;
      --dark:   #12211e;
      --text:   #2c3e35;
      --muted:  #6b7c74;
      --white:  #ffffff;
      --radius: 16px;
    }

    html { scroll-behavior: smooth; }
    body {
      font-family: 'Outfit', sans-serif;
      background: var(--sand);
      color: var(--text);
      overflow-x: hidden;
      min-height: 100vh;
    }

    /* ── NAV ── */
    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      display: flex; align-items: center; justify-content: space-between;
      padding: 16px 6vw;
      background: rgba(26,92,82,.95);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(200,146,58,.2);
    }
    .nav-logo {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.4rem; font-weight: 700; color: var(--gold2);
    }
    .nav-logo span { color: var(--white); }
    .nav-back {
      display: flex; align-items: center; gap: 8px;
      color: rgba(255,255,255,.8); text-decoration: none;
      font-size: .88rem; font-weight: 500;
      transition: color .2s;
    }
    .nav-back:hover { color: var(--gold2); }

    /* ── HERO BANNER ── */
    .place-hero {
      margin-top: 60px;
      height: 480px;
      position: relative;
      display: flex; align-items: flex-end;
      overflow: hidden;
      background: var(--teal3);
    }
    .hero-emoji {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 10rem;
      opacity: .18;
      user-select: none;
    }
    .hero-gradient {
      position: absolute; inset: 0;
      background: linear-gradient(to top, rgba(13,61,53,.95) 0%, rgba(13,61,53,.4) 50%, transparent 100%);
    }
    .hero-content {
      position: relative; z-index: 2;
      padding: 40px 6vw;
      width: 100%;
      animation: fadeUp .7s ease both;
    }
    .hero-category {
      display: inline-flex; align-items: center; gap: 6px;
      background: var(--gold);
      color: var(--white); font-size: .75rem; font-weight: 600;
      letter-spacing: .1em; text-transform: uppercase;
      padding: 5px 14px; border-radius: 50px;
      margin-bottom: 14px;
    }
    .hero-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(2.2rem, 6vw, 4rem);
      font-weight: 700; color: var(--white);
      line-height: 1.1;
    }
    .hero-dist {
      margin-top: 12px;
      display: inline-flex; align-items: center; gap: 6px;
      color: rgba(255,255,255,.7); font-size: .9rem;
    }

    @keyframes fadeUp { from { opacity:0; transform:translateY(24px); } to { opacity:1; transform:translateY(0); } }

    /* ── LAYOUT ── */
    .page-wrap {
      max-width: 1100px; margin: 0 auto;
      padding: 48px 6vw 80px;
      display: grid;
      grid-template-columns: 1fr 340px;
      gap: 40px;
      align-items: start;
    }
    @media(max-width: 768px) { .page-wrap { grid-template-columns: 1fr; } }

    /* ── MAIN CONTENT ── */
    .main-content { display: flex; flex-direction: column; gap: 32px; }

    .content-card {
      background: var(--white);
      border-radius: var(--radius);
      padding: 32px;
      border: 1px solid var(--sand2);
      animation: fadeUp .5s ease both;
    }

    .card-label {
      font-size: .72rem; font-weight: 600; letter-spacing: .14em;
      text-transform: uppercase; color: var(--gold);
      margin-bottom: 10px;
    }
    .card-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.5rem; font-weight: 700; color: var(--dark);
      margin-bottom: 14px;
    }
    .card-body {
      font-size: .95rem; color: var(--text);
      line-height: 1.8;
    }

    /* ── INFO GRID ── */
    .info-grid {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 16px; margin-top: 4px;
    }
    @media(max-width:500px) { .info-grid { grid-template-columns: 1fr; } }

    .info-item {
      background: var(--sand);
      border-radius: 12px; padding: 18px 20px;
      border: 1px solid var(--sand2);
      display: flex; flex-direction: column; gap: 4px;
    }
    .info-icon { font-size: 1.4rem; margin-bottom: 4px; }
    .info-label { font-size: .72rem; font-weight: 600; letter-spacing: .1em; text-transform: uppercase; color: var(--muted); }
    .info-value { font-size: 1rem; font-weight: 600; color: var(--dark); }

    /* ── NEARBY ── */
    .nearby-list { display: flex; flex-direction: column; gap: 12px; margin-top: 4px; }
    .nearby-item {
      display: flex; align-items: center; gap: 14px;
      padding: 14px 16px;
      border-radius: 12px;
      border: 1px solid var(--sand2);
      background: var(--sand);
      cursor: pointer; text-decoration: none;
      transition: transform .2s, border-color .2s;
    }
    .nearby-item:hover { transform: translateX(4px); border-color: var(--teal); }
    .nearby-icon { font-size: 1.6rem; width: 36px; text-align: center; }
    .nearby-name { font-weight: 600; color: var(--dark); font-size: .92rem; }
    .nearby-meta { font-size: .78rem; color: var(--muted); }
    .nearby-arr { margin-left: auto; color: var(--teal); font-size: 1.1rem; }

    /* ── SIDEBAR ── */
    .sidebar { display: flex; flex-direction: column; gap: 20px; }

    .side-card {
      background: var(--white);
      border-radius: var(--radius);
      padding: 24px;
      border: 1px solid var(--sand2);
      animation: fadeUp .6s ease both;
    }

    .side-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.15rem; font-weight: 700; color: var(--dark);
      margin-bottom: 16px;
      padding-bottom: 12px;
      border-bottom: 2px solid var(--sand2);
    }

    /* map embed */
    .map-embed {
      border-radius: 12px; overflow: hidden;
      border: 1px solid var(--sand2);
      height: 220px;
    }
    .map-embed iframe { width: 100%; height: 100%; border: none; }
    .map-fallback {
      height: 220px; border-radius: 12px;
      background: var(--teal3);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 8px; color: rgba(255,255,255,.6);
      font-size: .85rem; text-align: center;
    }
    .map-fallback span { font-size: 2rem; }

    /* add to plan btn */
    .plan-btn {
      width: 100%; padding: 14px;
      background: var(--teal); color: var(--white);
      border: none; border-radius: 10px;
      font-size: .95rem; font-weight: 600; cursor: pointer;
      transition: background .2s, transform .2s;
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .plan-btn:hover { background: var(--teal2); transform: translateY(-2px); }
    .plan-btn.added { background: #2e7d32; }

    .share-btn {
      width: 100%; padding: 12px;
      background: var(--sand); color: var(--text);
      border: 1px solid var(--sand2); border-radius: 10px;
      font-size: .88rem; font-weight: 600; cursor: pointer;
      transition: background .2s;
      margin-top: 10px;
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .share-btn:hover { background: var(--sand2); }

    /* tips */
    .tips-list { display: flex; flex-direction: column; gap: 10px; }
    .tip-item {
      display: flex; gap: 10px; align-items: flex-start;
      font-size: .85rem; color: var(--text); line-height: 1.5;
    }
    .tip-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--gold); flex-shrink: 0; margin-top: 6px;
    }

    /* breadcrumb */
    .breadcrumb {
      display: flex; align-items: center; gap: 8px;
      font-size: .8rem; color: var(--muted);
      margin-bottom: 8px;
    }
    .breadcrumb a { color: var(--teal); text-decoration: none; }
    .breadcrumb a:hover { text-decoration: underline; }

    /* loading / error */
    .page-loading {
      min-height: 60vh; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 16px;
      color: var(--muted);
    }
    .spinner {
      width: 36px; height: 36px;
      border: 3px solid var(--sand2); border-top-color: var(--teal);
      border-radius: 50%; animation: spin .7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .error-box {
      max-width: 480px; margin: 100px auto; text-align: center; padding: 40px;
    }
    .error-box .err-icon { font-size: 3rem; margin-bottom: 16px; }
    .error-box h2 { font-family: 'Cormorant Garamond', serif; font-size: 1.8rem; color: var(--dark); }
    .error-box p { color: var(--muted); margin-top: 8px; }
    .error-box a { display: inline-block; margin-top: 20px; padding: 12px 28px; background: var(--teal); color: var(--white); border-radius: 50px; text-decoration: none; font-weight: 600; }

    footer {
      background: var(--dark); padding: 32px 6vw;
      text-align: center; color: rgba(255,255,255,.4); font-size: .82rem;
    }
    .footer-logo { font-family: 'Cormorant Garamond', serif; font-size: 1.3rem; font-weight: 700; color: var(--gold2); margin-bottom: 8px; }
    .footer-logo span { color: var(--white); }
  </style>
</head>
<body>

<!-- NAV -->
<nav>
  <div class="nav-logo">Madampe<span>Explorer</span></div>
  <a href="index.html" class="nav-back">← Back to All Places</a>
</nav>

<!-- DYNAMIC CONTENT -->
<div id="app">
  <div class="page-loading">
    <div class="spinner"></div>
    <p>Loading place details…</p>
  </div>
</div>

<footer>
  <div class="footer-logo">Madampe<span>Explorer</span></div>
  <p>Smart Tourist Guide · Madampe, Puttalam District, Sri Lanka</p>
</footer>

<script>
const API = './api';

// Category tips
const TIPS = {
  Sightseeing: ['Best visited early morning or late afternoon for golden light.','Wear comfortable shoes for walking around.','Bring sunscreen and water.'],
  Religious:   ['Dress modestly — cover shoulders and knees.','Remove shoes before entering temple grounds.','Be respectful during prayer times.'],
  Nature:      ['Bring insect repellent for outdoor areas.','Best visited during dry season (Dec–April).','Carry water and snacks for longer walks.'],
  Cultural:    ['Interact with locals respectfully for an authentic experience.','Photography may be restricted in some areas — ask first.','Visit on weekday mornings to avoid crowds.'],
  Leisure:     ['Weekends can be crowded — visit on weekdays if possible.','Facilities may vary — call ahead to confirm opening times.','Great for families and group outings.'],
  Hotel:       ['Book in advance during peak season (Dec–April).','Check for beachfront dining options.','Ask about local tour packages at the front desk.'],
};

const DEFAULT_TIPS = ['Check opening times before visiting.','Carry cash as card facilities may not be available.','Hire a local guide for a richer experience.'];

// Get place ID from URL
function getPlaceId() {
  const params = new URLSearchParams(window.location.search);
  return params.get('id');
}

// Render the full page
function renderPage(place, allPlaces) {
  const tips    = TIPS[place.category_name] || DEFAULT_TIPS;
  const nearby  = allPlaces
    .filter(p => p.id !== place.id && p.category_name === place.category_name)
    .slice(0, 3);

  const hasCoords = place.latitude && place.longitude;
  const mapSrc = hasCoords
    ? `https://www.google.com/maps/embed/v1/place?key=YOUR_API_KEY&q=${place.latitude},${place.longitude}&zoom=14`
    : null;

  // Time to visit suggestion
  const timeMap = {Sightseeing:'6:00 AM – 7:00 PM', Religious:'6:00 AM – 8:00 PM', Nature:'6:00 AM – 5:00 PM', Cultural:'8:00 AM – 6:00 PM', Leisure:'8:00 AM – 8:00 PM', Hotel:'Open 24 hours'};
  const visitTime = timeMap[place.category_name] || '8:00 AM – 6:00 PM';

  document.title = `${place.name} – Madampe Explorer`;

  document.getElementById('app').innerHTML = `
    <!-- HERO -->
    <div class="place-hero" style="${place.image_url ? `background:linear-gradient(to top, rgba(13,61,53,.95) 0%, rgba(13,61,53,.3) 60%, transparent 100%), url('${place.image_url}') center/cover no-repeat` : ''}">
      ${place.image_url ? '' : `<div class="hero-emoji">${place.category_icon || '📍'}</div><div class="hero-gradient"></div>`}
      <div class="hero-content">
        <div class="breadcrumb">
          <a href="index.html">Home</a> › <a href="index.html#categories">Places</a> › ${place.name}
        </div>
        <div class="hero-category">${place.category_icon || '📍'} ${place.category_name}</div>
        <h1 class="hero-title">${place.name}</h1>
        <div class="hero-dist">📍 ${place.distance_km} km from Madampe town centre</div>
      </div>
    </div>

    <!-- PAGE BODY -->
    <div class="page-wrap">

      <!-- MAIN -->
      <div class="main-content">

        <!-- About -->
        <div class="content-card">
          <div class="card-label">About this place</div>
          <div class="card-title">${place.name}</div>
          <div class="card-body">${place.description}</div>
        </div>

        <!-- Info Grid -->
        <div class="content-card">
          <div class="card-label">Quick Info</div>
          <div class="info-grid">
            <div class="info-item">
              <div class="info-icon">📍</div>
              <div class="info-label">Distance</div>
              <div class="info-value">${place.distance_km} km away</div>
            </div>
            <div class="info-item">
              <div class="info-icon">🏷️</div>
              <div class="info-label">Category</div>
              <div class="info-value">${place.category_name}</div>
            </div>
            <div class="info-item">
              <div class="info-icon">🕐</div>
              <div class="info-label">Visiting Hours</div>
              <div class="info-value">${visitTime}</div>
            </div>
            <div class="info-item">
              <div class="info-icon">🌤️</div>
              <div class="info-label">Best Season</div>
              <div class="info-value">Dec – April</div>
            </div>
          </div>
        </div>

        <!-- Visitor Tips -->
        <div class="content-card">
          <div class="card-label">Visitor Tips</div>
          <div class="card-title">Before You Go</div>
          <div class="tips-list">
            ${tips.map(t => `<div class="tip-item"><div class="tip-dot"></div><span>${t}</span></div>`).join('')}
          </div>
        </div>

        <!-- Nearby same category -->
        ${nearby.length > 0 ? `
        <div class="content-card">
          <div class="card-label">More Like This</div>
          <div class="card-title">Similar Places Nearby</div>
          <div class="nearby-list">
            ${nearby.map(p => `
              <a class="nearby-item" href="place.html?id=${p.id}">
                <div class="nearby-icon">${p.category_icon || '📍'}</div>
                <div>
                  <div class="nearby-name">${p.name}</div>
                  <div class="nearby-meta">${p.category_name} · ${p.distance_km} km from Madampe</div>
                </div>
                <div class="nearby-arr">›</div>
              </a>`).join('')}
          </div>
        </div>` : ''}

      </div>

      <!-- SIDEBAR -->
      <div class="sidebar">

        <!-- Map -->
        <div class="side-card">
          <div class="side-title">📍 Location</div>
          ${hasCoords ? `
            <div class="map-embed">
              <iframe
                src="https://www.google.com/maps/embed?pb=!1m14!1m12!1m3!1d8000!2d${place.longitude}!3d${place.latitude}!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!5e0!3m2!1sen!2slk!4v1712000000000"
                allowfullscreen="" loading="lazy">
              </iframe>
            </div>` : `
            <div class="map-fallback">
              <span>🗺️</span>
              <p>Map coordinates not available for this location</p>
            </div>`}
          ${hasCoords ? `
            <a href="https://www.google.com/maps?q=${place.latitude},${place.longitude}" target="_blank"
               style="display:block;margin-top:12px;text-align:center;color:var(--teal);font-size:.85rem;font-weight:600;text-decoration:none;">
              Open in Google Maps ↗
            </a>` : ''}
        </div>

        <!-- Add to Plan -->
        <div class="side-card">
          <div class="side-title">🗓️ Trip Planner</div>
          <p style="font-size:.85rem;color:var(--muted);margin-bottom:16px;line-height:1.6;">
            Add this place to your one-day itinerary and plan your visit.
          </p>
          <button class="plan-btn" id="planBtn" onclick="togglePlan(${place.id})">
            + Add to My Trip Plan
          </button>
          <button class="share-btn" onclick="sharePage('${place.name}')">
            🔗 Share This Place
          </button>
        </div>

        <!-- Distance Info -->
        <div class="side-card">
          <div class="side-title">🚗 Getting There</div>
          <div class="tips-list">
            <div class="tip-item"><div class="tip-dot"></div><span>${place.distance_km} km from Madampe town centre.</span></div>
            <div class="tip-item"><div class="tip-dot"></div><span>Approx. ${Math.ceil(place.distance_km * 2)} min by tuk-tuk or car.</span></div>
            <div class="tip-item"><div class="tip-dot"></div><span>Local buses available from Madampe bus stand.</span></div>
            <div class="tip-item"><div class="tip-dot"></div><span>Taxi apps like PickMe operate in this area.</span></div>
          </div>
        </div>

      </div>
    </div>
  `;

  // Restore plan button state
  updatePlanBtn(place.id);
}

// Plan button logic (syncs with homepage via localStorage key)
function togglePlan(id) {
  let saved = JSON.parse(localStorage.getItem('madampe_plan') || '[]');
  const idx = saved.indexOf(id);
  if (idx === -1) saved.push(id); else saved.splice(idx, 1);
  localStorage.setItem('madampe_plan', JSON.stringify(saved));
  updatePlanBtn(id);
}

function updatePlanBtn(id) {
  const btn = document.getElementById('planBtn');
  if (!btn) return;
  const saved = JSON.parse(localStorage.getItem('madampe_plan') || '[]');
  if (saved.includes(id)) {
    btn.textContent = '✅ Added to Trip Plan';
    btn.classList.add('added');
  } else {
    btn.textContent = '+ Add to My Trip Plan';
    btn.classList.remove('added');
  }
}

function sharePage(name) {
  if (navigator.share) {
    navigator.share({ title: name + ' – Madampe Explorer', url: window.location.href });
  } else {
    navigator.clipboard.writeText(window.location.href);
    alert('Link copied to clipboard!');
  }
}

function showError(msg) {
  document.getElementById('app').innerHTML = `
    <div class="error-box">
      <div class="err-icon">😕</div>
      <h2>Place Not Found</h2>
      <p>${msg}</p>
      <a href="index.html">← Back to All Places</a>
    </div>`;
}

// FALLBACK DATA (when API not available)
const FALLBACK = [
  {id:1,name:"Marawila Beach",category_name:"Sightseeing",category_icon:"🏖️",distance_km:8,description:"A popular sandy beach ideal for relaxation, swimming, and watching breathtaking sunsets over the Indian Ocean. A favourite spot for families and tourists alike. The calm waters make it suitable for swimming, and the long stretch of coastline is perfect for an evening stroll.",latitude:7.5100,longitude:79.8800,image_url:"https://beaches-searcher.com/images/beaches/144201013/LK201013.jpg"},
  {id:2,name:"Munneswaram Temple",category_name:"Religious",category_icon:"🛕",distance_km:15,description:"A historic and revered Hindu temple that has attracted pilgrims for centuries. The annual festival draws thousands of devotees from across Sri Lanka. The temple complex is dedicated to Lord Shiva and is one of the five ancient Shiva temples of Sri Lanka.",latitude:7.6050,longitude:79.9200,image_url:"https://www.lovesrilanka.org/wp-content/uploads/2020/05/LS_B2_Sri-Munneswaram-Devasthanam_1920x700.jpg"},
  {id:3,name:"Chilaw Beach Park",category_name:"Leisure",category_icon:"🌊",distance_km:18,description:"A public coastal recreation area offering a relaxed environment for picnics, walks along the shore, and enjoying the sea breeze. A great family destination with open spaces and views of the Indian Ocean.",latitude:7.5750,longitude:79.7950,image_url:"https://www.india-tours.com/blog/wp-content/uploads/2021/06/chilaw-beach-park.jpg"},
  {id:4,name:"Senanayake Aramaya",category_name:"Religious",category_icon:"🏯",distance_km:6,description:"A peaceful and beautifully maintained Buddhist temple offering a serene atmosphere for meditation and reflection amidst lush gardens. The temple grounds are well kept and provide a tranquil escape from the busy town.",latitude:7.6200,longitude:79.8850,image_url:"https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcThe8FZ2ljBMOy1JeuMty7Suk01P2VXTIMeRA&s"},
  {id:5,name:"Madampe Market",category_name:"Cultural",category_icon:"🏛️",distance_km:1,description:"The vibrant local marketplace at the heart of Madampe town, showcasing the authentic daily community life, fresh produce, spices, and local handicrafts. A must-visit to experience the true culture of the area.",latitude:7.6136,longitude:79.8703,image_url:"https://img.freepik.com/free-photo/fresh-vegetables-fruit-market-stall_1101-2560.jpg?semt=ais_hybrid&w=740&q=80"},
  {id:6,name:"Deduru Oya River",category_name:"Nature",category_icon:"🌿",distance_km:12,description:"A scenic river environment offering stunning views, birdwatching opportunities, and a tranquil escape into nature. Ideal for photography and relaxed exploration along the riverbanks.",latitude:7.6400,longitude:79.9400,image_url:"https://lakpura.com/cdn/shop/files/LK94009321-06-E.jpg?v=1765351085&width=3200"},
  {id:7,name:"Thoduwawa Beach",category_name:"Sightseeing",category_icon:"🎣",distance_km:10,description:"A charming fishing village beach with natural scenery and a glimpse into authentic coastal life. Watch local fishermen bring in their daily catch and enjoy the peaceful atmosphere away from tourist crowds.",latitude:7.5400,longitude:79.8600,image_url:"https://dynamic-media-cdn.tripadvisor.com/media/photo-o/2f/87/1f/3b/caption.jpg?w=1200&h=1200&s=1"},
  {id:8,name:"St. Anne's Church Talawila",category_name:"Religious",category_icon:"⛪",distance_km:22,description:"A famous Catholic pilgrimage destination renowned throughout Sri Lanka. The annual feast of St. Anne draws hundreds of thousands of pilgrims from across the island and beyond.",latitude:7.7200,longitude:79.8200,image_url:"https://www.attractionsinsrilanka.com/wp-content/uploads/2020/06/Annes-National-Shrine.jpg"},

async function init() {
  const id = getPlaceId();
  if (!id) { showError('No place ID provided in the URL.'); return; }

  try {
    const [pRes, allRes] = await Promise.all([
      fetch(`${API}/places.php?id=${id}`),
      fetch(`${API}/places.php`)
    ]);
    const pData   = await pRes.json();
    const allData = await allRes.json();

    if (!pData.success) throw new Error(pData.error || 'Not found');
    renderPage(pData.data, allData.success ? allData.data : FALLBACK);

  } catch {
    // Fallback to static data
    const place = FALLBACK.find(p => p.id === parseInt(id));
    if (!place) { showError('This place could not be found. It may have been removed.'); return; }
    renderPage(place, FALLBACK);
  }
}

init();
</script>
